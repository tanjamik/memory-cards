<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Memory Game</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Favicon and home-screen icon -->
  <link rel="icon" type="image/jpeg" href="supermen.jpg" />
  <link rel="apple-touch-icon" href="supermen.jpg" />
</head>
<body>
  <div class="header">
    <img src="supermen.jpg" alt="Superman mascot" class="mascot" />
    <span>Score: <strong id="score">0</strong></span>
    &nbsp;|&nbsp;
    <span>Mistakes: <strong id="mistakes">0</strong></span>
  </div>
  <div id="game-board" class="grid"></div>
  <p id="status">Pronadji parove! Kada dodjes do 3 poena, prelazis u sledeci nivo! Kada dodjes do 10 gresaka, skor se resetuje. Pobedi me!</p>
  <button onclick="resetGame()">Restart Game</button>

  <script src="script.js"></script>
</body>
</html>
